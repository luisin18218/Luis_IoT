<!DOCTYPE html>
<html>
    <head>
        <title> Potenciometro </title>

        <style>
            body { font-family: Arial; text-align: center; margin: 50px; }
            h1 {color: aqua;}
            #potValue { font-size: 24px; color: chocolate;}
        </style>

    </head>
    <body>
        <h1>Lectura del Potenciometro</h1>
        <p>Valor actual: </p>
        <p id="potValue"> --- </p>
        
        <script>
            function upadatePot() {
                fetch('/pot')
                .then(Response => Response.text())
                .then(data => document.getElementById('potValue').innerText = data)
                
            }
            setInterval(upadatePot,1000);
        </script>
    </body>

</html>
